<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Gavin makes stuff</title>
  <link rel="icon" href="/images/site/favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="site-nav-placeholder"></div>

  <div class="contact-wrap">
    <div class="contact-hero">
      <img src="/images/site/headshot-placeholder.svg" alt="Gavin Krohn">
      <div>
        <h1>Gavin Krohn</h1>
        <p class="location">📍 Located in Vancouver, BC</p>
      </div>
    </div>

    <div class="contact-links">
      <a class="contact-link-row" href="mailto:REPLACE_WITH_EMAIL">
        <span class="contact-link-icon">✉️</span>
        <div>
          <div class="contact-link-label">Email</div>
          <div class="contact-link-sub">REPLACE_WITH_EMAIL</div>
        </div>
      </a>

      <a class="contact-link-row" href="https://www.linkedin.com/in/gavin-krohman/" target="_blank" rel="noopener">
        <span class="contact-link-icon">💼</span>
        <div>
          <div class="contact-link-label">LinkedIn</div>
          <div class="contact-link-sub">linkedin.com/in/gavin-krohman</div>
        </div>
      </a>

      <a class="contact-link-row" href="https://dribbble.com/GavinKrohman" target="_blank" rel="noopener">
        <span class="contact-link-icon">🏀</span>
        <div>
          <div class="contact-link-label">Dribbble</div>
          <div class="contact-link-sub">dribbble.com/GavinKrohman</div>
        </div>
      </a>
    </div>
  </div>

  <footer class="site-footer">
    <div class="container"><span>© 2026 Gavin makes stuff</span></div>
  </footer>

  <script src="/js/shared.js"></script>
  <script>injectNav('contact');</script>
</body>
</html>
