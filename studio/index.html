<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Studio — Gavin makes stuff</title>
  <link rel="icon" id="site-favicon" href="/images/site/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="site-nav-placeholder"></div>

  <header class="hero">
    <div class="container">
      <p class="hero-eyebrow">Workshop &amp; Blog</p>
      <h1>The Studio</h1>
      <p class="lede">Projects, builds, and the occasional thing that catches fire a little. Grab the files, follow along, build your own.</p>
      <p id="studio-bio" style="display:none;font-size:.95rem;color:var(--color-muted);max-width:580px;margin-top:8px;"></p>
      <div class="hero-actions">
        <a class="btn btn-primary" href="/studio/projects.html">Browse projects</a>
        <a class="btn" href="/studio/blog.html">Read the blog</a>
      </div>
    </div>
  </header>

  <section class="section">
    <div class="container">
      <div class="section-heading">
        <h2>Recent projects</h2>
        <a href="/studio/projects.html">All projects →</a>
      </div>
      <div id="featured-projects-grid" class="card-grid"><div class="empty-state">Loading…</div></div>
    </div>
  </section>

  <section class="section" style="padding-top:0;">
    <div class="container">
      <div class="section-heading">
        <h2>Latest from the blog</h2>
        <a href="/studio/blog.html">All posts →</a>
      </div>
      <div id="featured-blog-list" class="blog-list"><div class="empty-state">Loading…</div></div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container"><span id="footer-text">© 2026 Gavin makes stuff</span></div>
  </footer>

  <script src="/js/shared.js"></script>
  <script>
    injectNav('studio', true);
    (async function () {
      try {
        var [pRes, bRes, sRes] = await Promise.all([
          fetch('/data/projects.json'),
          fetch('/data/blog.json'),
          fetch('/data/site-settings.json'),
        ]);
        initProjects(await pRes.json());
        initBlog(await bRes.json());
        applySettings(await sRes.json(), 'studio');
      } catch (e) { console.error(e); }
      renderProjectCards('featured-projects-grid', 'studio', '/studio/project.html', 3);
      renderBlogCards('featured-blog-list', '/studio/blog-post.html', 1);
    })();
  </script>
</body>
</html>
