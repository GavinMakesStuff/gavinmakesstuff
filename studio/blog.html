<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — The Studio</title>
  <link rel="icon" id="site-favicon" href="/images/site/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="site-nav-placeholder"></div>

  <header class="hero">
    <div class="container">
      <p class="hero-eyebrow">Writing</p>
      <h1>Blog</h1>
      <p class="lede">Stories behind the builds, lessons learned, and whatever else is on my mind.</p>
    </div>
  </header>

  <section class="section" style="padding-top:0;">
    <div class="container">
      <div id="blog-posts-list" class="blog-list"><div class="empty-state">Loading…</div></div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container"><span id="footer-text">© 2026 Gavin makes stuff</span></div>
  </footer>

  <script src="/js/shared.js"></script>
  <script>
    injectNav('blog', true);
    (async function () {
      try {
        var [bRes, sRes] = await Promise.all([fetch('/data/blog.json'), fetch('/data/site-settings.json')]);
        initBlog(await bRes.json());
        applySettings(await sRes.json(), 'studioBlog');
      } catch (e) { console.error(e); }
      renderBlogCards('blog-posts-list', '/studio/blog-post.html');
    })();
  </script>
</body>
</html>
