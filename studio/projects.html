<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — The Studio</title>
  <link rel="icon" id="site-favicon" href="/images/site/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="site-nav-placeholder"></div>

  <header class="hero">
    <div class="container">
      <p class="hero-eyebrow">The Studio</p>
      <h1>Projects</h1>
      <p class="lede">Everything built and shared so far. Click any card for the full write-up, photos, and files.</p>
    </div>
  </header>

  <section class="section" style="padding-top:0;">
    <div class="container">
      <div id="all-projects-grid" class="card-grid"><div class="empty-state">Loading…</div></div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container"><span id="footer-text">© 2026 Gavin makes stuff</span></div>
  </footer>

  <script src="/js/shared.js"></script>
  <script>
    injectNav('studio', true);
    (async function () {
      try {
        var [pRes, sRes] = await Promise.all([fetch('/data/projects.json'), fetch('/data/site-settings.json')]);
        initProjects(await pRes.json());
        applySettings(await sRes.json(), 'studioProjects');
      } catch (e) { console.error(e); }
      renderProjectCards('all-projects-grid', 'studio', '/studio/project.html');
    })();
  </script>
</body>
</html>
