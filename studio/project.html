<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project — Gavin makes stuff</title>
  <link rel="icon" href="/images/site/favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <nav class="site-nav">
    <div class="container">
      <a class="logo" href="/public/index.html">Gavin makes stuff</a>
      <ul class="nav-links">
        <li><a href="/public/index.html">Home</a></li>
        <li><a href="/public/projects.html" class="active">Projects</a></li>
        <li><a href="/public/blog.html">Blog</a></li>

    </div>
  </nav>

  <div class="container detail-header">
    <a class="back-link" href="/public/projects.html">← Back to all projects</a>

  <footer class="site-footer">

      <span>© 2026 Gavin makes stuff</span>

  <div class="lightbox-overlay" id="lightbox-overlay" onclick="closeLightbox()">

    <img id="lightbox-image" src="" alt="Enlarged gallery image" onclick="event.stopPropagation()">
  </div>

  <script src="/js/shared.js"></script>
  <script>
    (async function () {
      try {
        const res = await fetch('/data/projects.json');
        initProjects(await res.json());
      } catch (e) { console.error('Data load failed', e); }
      renderProjectDetail('public');
    })();
  </script>
