<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gavin Krohman — Portfolio</title>
  <link rel="icon" id="site-favicon" href="/images/site/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="site-nav-placeholder"></div>

  <div class="container">
    <div class="bio-section">
      <img id="bio-headshot" src="/images/site/headshot-placeholder.svg" alt="Gavin Krohman">
      <div>
        <p class="hero-eyebrow" style="margin-top:16px;">Designer &amp; Maker</p>
        <h1 id="bio-name">Gavin Krohman</h1>
        <p id="bio-summary">Replace this with a short professional summary — your background, the kind of work you're looking for, and the skills you most want to highlight.</p>
      </div>
    </div>
  </div>

  <section class="section" style="padding-top:0;">
    <div class="container">
      <div class="section-heading"><h2>Selected projects</h2></div>
      <div id="portfolio-grid" class="card-grid"><div class="empty-state">Loading…</div></div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container">
      <span>© 2026 Gavin Krohman</span>
      <span id="footer-email"></span>
    </div>
  </footer>

  <script src="/js/shared.js"></script>
  <script>
    injectNav('portfolio', false);
    (async function () {
      try {
        var [pRes, sRes] = await Promise.all([fetch('/data/projects.json'), fetch('/data/site-settings.json')]);
        initProjects(await pRes.json());
        var s = await sRes.json();
        initSettings(s);
        if (s.favicon) document.getElementById('site-favicon').href = s.favicon;
        if (s.bio) {
          if (s.bio.headshot) document.getElementById('bio-headshot').src = s.bio.headshot;
          if (s.bio.name)     document.getElementById('bio-name').textContent = s.bio.name;
          if (s.bio.portfolioSummary) document.getElementById('bio-summary').textContent = s.bio.portfolioSummary;
        }
        if (s.contact && s.contact.email) {
          var el = document.getElementById('footer-email');
          el.innerHTML = '<a href="mailto:' + s.contact.email + '" style="color:var(--color-muted);">' + s.contact.email + '</a>';
        }
      } catch (e) { console.error(e); }
      renderProjectCards('portfolio-grid', 'portfolio', '/portfolio/project.html');
    })();
  </script>
</body>
</html>
