<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage — Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#0C0D0E;--ink-r:#131416;--ink-r2:#0F1011;--border:#1E2022;--border-h:#2C2F32;--red:#D93025;--paper:#F2EFE9;--muted:#6B7075;--radius:10px;}
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{background:var(--ink);color:var(--paper);font-family:'Inter',sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;}
    h1,h2,h3{font-family:'Space Grotesk',sans-serif;font-weight:700;letter-spacing:-.02em;}
    a{color:var(--red);text-decoration:none;}

    /* auth gate */
    #auth-gate{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;text-align:center;padding:24px;}

    /* nav */
    .admin-nav{background:var(--ink-r);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
    .admin-nav .logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1rem;letter-spacing:.04em;text-transform:uppercase;}
    .nav-links{display:flex;gap:20px;align-items:center;flex-wrap:wrap;}
    .nav-links a{color:var(--muted);font-size:.78rem;letter-spacing:.05em;text-transform:uppercase;transition:color .15s;}
    .nav-links a:hover,.nav-links a.active{color:var(--paper);}
    #logout-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.78rem;letter-spacing:.05em;text-transform:uppercase;padding:0;font-family:'Inter',sans-serif;}
    #logout-btn:hover{color:var(--paper);}
    #user-bar{font-size:.75rem;color:var(--muted);}

    /* tabs */
    .tab-bar{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 24px;background:var(--ink-r);}
    .tab-btn{background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'Inter',sans-serif;font-size:.82rem;font-weight:500;letter-spacing:.04em;text-transform:uppercase;padding:12px 18px;cursor:pointer;transition:color .15s,border-color .15s;margin-bottom:-1px;}
    .tab-btn:hover{color:var(--paper);}
    .tab-btn.active{color:var(--paper);border-bottom-color:var(--red);}

    /* wrap */
    .admin-wrap{max-width:1000px;margin:0 auto;padding:28px 24px 80px;}

    /* cards */
    .card{background:var(--ink-r);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:20px;}

    /* form */
    label{display:block;font-size:.78rem;font-weight:500;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
    .hint{font-size:.75rem;color:var(--muted);margin-top:4px;}
    input[type=text],input[type=date],input[type=url],textarea,select{width:100%;background:var(--ink);border:1px solid var(--border);border-radius:6px;padding:9px 12px;color:var(--paper);font-family:'Inter',sans-serif;font-size:.9rem;transition:border-color .15s;}
    input:focus,textarea:focus,select:focus{outline:none;border-color:var(--red);}
    textarea{resize:vertical;}
    .field{margin-bottom:16px;}
    .checkbox-row{display:flex;gap:20px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
    .checkbox-row label,.check-label{display:flex;align-items:center;gap:7px;font-weight:400;font-size:.85rem;letter-spacing:0;text-transform:none;color:var(--paper);margin:0;cursor:pointer;}
    input[type=checkbox]{width:16px;height:16px;accent-color:var(--red);cursor:pointer;}

    /* buttons */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--paper);font-family:'Inter',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;white-space:nowrap;}
    .btn:hover{background:var(--border);}
    .btn-primary{background:var(--red);border-color:var(--red);color:#fff;}
    .btn-primary:hover{background:#bc251c;}
    .btn-ghost{background:var(--border);border-color:var(--muted);}
    .btn-danger{border-color:#e05555;color:#e05555;}
    .btn-danger:hover{background:rgba(224,85,85,.1);}
    .btn-sm{padding:5px 11px;font-size:.75rem;}
    .btn:disabled{opacity:.45;cursor:not-allowed;}
    .btn-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:20px;}

    /* list view */
    .section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .item-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0;border-top:1px solid var(--border);}
    .item-row:first-of-type{border-top:none;}
    .item-title{font-weight:500;font-size:.9rem;}
    .item-meta{font-size:.74rem;color:var(--muted);margin-top:2px;}
    .item-actions{display:flex;gap:8px;flex-shrink:0;}
    .badge{font-size:.65rem;padding:2px 7px;border-radius:4px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-left:6px;}
    .badge-draft{background:rgba(217,48,37,.1);color:var(--red);}
    .badge-live{background:rgba(34,197,94,.1);color:#16a34a;}

    /* markdown toolbar */
    .toolbar{display:flex;gap:5px;margin-bottom:5px;flex-wrap:wrap;}
    .toolbar button{background:var(--ink);border:1px solid var(--border);color:var(--paper);border-radius:5px;padding:4px 9px;font-size:.75rem;cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s,border-color .15s;}
    .toolbar button:hover{background:var(--border-h);border-color:var(--red);}

    /* collapsible sections */
    details{background:var(--ink-r2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;}
    details[open]{border-color:var(--border-h);}
    summary{padding:14px 18px;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.9rem;letter-spacing:.02em;list-style:none;display:flex;align-items:center;justify-content:space-between;user-select:none;}
    summary::-webkit-details-marker{display:none;}
    summary::after{content:'↓';font-size:.75rem;color:var(--muted);transition:transform .2s;}
    details[open] summary::after{transform:rotate(180deg);}
    summary .tone-badge{font-size:.65rem;padding:2px 8px;border-radius:4px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;}
    .tone-studio{background:rgba(61,217,184,.08);color:#3dd9b8;border:1px solid rgba(61,217,184,.2);}
    .tone-portfolio{background:rgba(217,48,37,.08);color:var(--red);border:1px solid rgba(217,48,37,.2);}
    .section-body{padding:18px;}

    /* uploads */
    .upload-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
    .upload-item{display:flex;align-items:center;gap:10px;background:var(--ink);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:.82rem;}
    .upload-item img{width:34px;height:34px;object-fit:cover;border-radius:4px;}
    .upload-item .path{flex:1;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .upload-item button{background:none;border:none;color:#e05555;cursor:pointer;font-size:.9rem;padding:0 4px;}

    /* downloads section widget */
    .downloads-section-box{background:var(--ink);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:6px;}
    .download-add-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
    @media(max-width:600px){.download-add-grid{grid-template-columns:1fr;}}
    .download-add-grid .field{margin-bottom:0;}

    /* status bar */
    .status-bar{padding:12px 16px;border-radius:8px;margin-bottom:18px;background:rgba(217,48,37,.06);border:1px solid rgba(217,48,37,.15);font-size:.85rem;display:none;align-items:center;gap:10px;}
    .status-bar.visible{display:flex;}
    .status-bar.ok{background:rgba(34,197,94,.06);border-color:rgba(34,197,94,.2);color:#16a34a;}
    .status-bar.error{background:rgba(224,85,85,.08);border-color:rgba(224,85,85,.3);color:#e05555;}
    .spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* settings page */
    .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
    @media(max-width:700px){.settings-grid{grid-template-columns:1fr;}}

    /* favicon preview */
    .favicon-preview{display:flex;align-items:center;gap:12px;padding:12px;background:var(--ink);border:1px solid var(--border);border-radius:6px;}
    .favicon-preview img{width:32px;height:32px;object-fit:contain;}

    /* creations builder */
    .creation-item{background:var(--ink);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px;}
    .creation-item-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
    .creation-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    @media(max-width:600px){.creation-row{grid-template-columns:1fr;}}
    .creation-pw-hint{background:rgba(217,48,37,.06);border:1px solid rgba(217,48,37,.15);border-radius:6px;padding:8px 12px;font-size:.75rem;color:var(--muted);margin:-4px 0 12px;}
    .creation-pw-hint code{color:var(--paper);background:var(--ink-r2);padding:1px 5px;border-radius:3px;}
    .creation-section-label{font-size:.78rem;font-weight:600;color:var(--paper);margin-bottom:10px;letter-spacing:.02em;}
  </style>
</head>
<body>

<div id="auth-gate">
  <div class="spinner" style="width:28px;height:28px;border-width:3px;"></div>
  <p style="color:var(--muted);">Checking login…</p>
</div>

<div id="app" style="display:none;">

  <nav class="admin-nav">
    <span class="logo">Admin</span>
    <div class="nav-links">
      <a href="/admin/ai-draft.html">AI Draft</a>
      <a href="/admin/manage.html" class="active">Manage</a>
      <a href="/admin/analytics.html">Analytics</a>
      <a href="/studio/index.html" target="_blank">View Site ↗</a>
      <span id="user-bar"></span>
      <button id="logout-btn" onclick="logout()">Log out</button>
    </div>
  </nav>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('projects',this)">Projects</button>
    <button class="tab-btn" onclick="switchTab('blog',this)">Blog</button>
    <button class="tab-btn" onclick="switchTab('settings',this)">Site Settings</button>
  </div>

  <div class="admin-wrap">
    <div class="status-bar" id="status-bar">
      <div class="spinner" id="status-spinner"></div>
      <span id="status-text"></span>
    </div>

    <!-- PROJECTS TAB -->
    <div id="tab-projects">
      <div id="projects-list-view">
        <div class="card">
          <div class="section-head">
            <h2 style="font-size:1.1rem;">Projects</h2>
            <button class="btn btn-primary btn-sm" onclick="newItem('project')">+ New project</button>
          </div>
          <div id="projects-list"></div>
        </div>
      </div>
      <div id="projects-form-view" style="display:none;"></div>
    </div>

    <!-- BLOG TAB -->
    <div id="tab-blog" style="display:none;">
      <div id="blog-list-view">
        <div class="card">
          <div class="section-head">
            <h2 style="font-size:1.1rem;">Blog posts</h2>
            <button class="btn btn-primary btn-sm" onclick="newItem('blog')">+ New post</button>
          </div>
          <div id="blog-list"></div>
        </div>
      </div>
      <div id="blog-form-view" style="display:none;"></div>
    </div>

    <!-- SETTINGS TAB -->
    <div id="tab-settings" style="display:none;">
      <div id="settings-view"></div>
    </div>

  </div>
</div>

<script>
/* ── Auth ── */
var currentToken = sessionStorage.getItem('gh_token');
var currentUsername = sessionStorage.getItem('gh_username');
var state = { projects:[], blog:[], settings:{}, activeTab:'projects' };

function showLoginGate(){
  document.getElementById('auth-gate').innerHTML =
    '<h2 style="font-family:\'Space Grotesk\',sans-serif;margin-bottom:6px;">Admin Login</h2>' +
    '<p style="color:var(--muted);max-width:300px;text-align:center;font-size:.9rem;">Log in with the GitHub account that owns this site.</p>' +
    '<button class="btn btn-primary" onclick="loginWithGitHub()">Log in with GitHub</button>';
  document.getElementById('auth-gate').style.display='flex';
  document.getElementById('app').style.display='none';
}
function showApp(){
  document.getElementById('auth-gate').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('user-bar').textContent=currentUsername||'';
  loadAll();
}
function loginWithGitHub(){
  var popup=window.open('/api/auth','github-oauth','width=600,height=700');
  if(!popup){showStatus('Popup blocked. Allow popups and try again.',true);return;}
  function handler(e){
    if(typeof e.data!=='string')return;
    if(e.data==='authorizing:github'){popup.postMessage('authorizing:github','*');return;}
    if(e.data.indexOf('authorization:github:success:')===0){
      var payload=JSON.parse(e.data.slice('authorization:github:success:'.length));
      currentToken=payload.token;
      sessionStorage.setItem('gh_token',currentToken);
      window.removeEventListener('message',handler);
      fetch('https://api.github.com/user',{headers:{Authorization:'Bearer '+currentToken}})
        .then(function(r){return r.json();})
        .then(function(u){currentUsername=u.login||'';sessionStorage.setItem('gh_username',currentUsername);showApp();})
        .catch(function(){showApp();});
    }
  }
  window.addEventListener('message',handler);
}
function logout(){sessionStorage.removeItem('gh_token');sessionStorage.removeItem('gh_username');currentToken=null;currentUsername=null;showLoginGate();}
if(currentToken){showApp();}else{showLoginGate();}

/* ── Tabs ── */
function switchTab(name,btn){
  state.activeTab=name;
  ['projects','blog','settings'].forEach(function(t){
    document.getElementById('tab-'+t).style.display=t===name?'block':'none';
  });
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  if(btn)btn.classList.add('active');
  if(name==='settings')renderSettingsForm();
}

/* ── API helper ── */
async function callApi(payload){
  var res=await fetch('/api/manage-content',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+currentToken},body:JSON.stringify(payload)});
  var data=await res.json();
  if(!res.ok)throw new Error(data.error||'Request failed');
  return data;
}

/* ── Status ── */
function showStatus(msg,isError,isOk){
  var bar=document.getElementById('status-bar');
  document.getElementById('status-text').textContent=msg;
  document.getElementById('status-spinner').style.display=(isError||isOk)?'none':'block';
  bar.className='status-bar visible'+(isError?' error':isOk?' ok':'');
  bar.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function hideStatus(){document.getElementById('status-bar').className='status-bar';}

function slugify(s){return(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');}

/* ── Load ── */
async function loadAll(){
  showStatus('Loading…',false);
  try{
    var data=await callApi({action:'list'});
    state.projects=data.projects||[];
    state.blog=data.blog||[];
    state.settings=data.settings||{};
    renderLists();
    hideStatus();
  }catch(e){showStatus('Could not load: '+e.message,true);}
}

/* ── List rendering ── */
function renderLists(){
  var pEl=document.getElementById('projects-list');
  pEl.innerHTML=state.projects.length?state.projects.map(function(p){
    return '<div class="item-row"><div><div class="item-title">'+(p.public.title||p.id)+
      '<span class="badge '+(p.draft?'badge-draft">Draft':'badge-live">Live')+'</span></div>'+
      '<div class="item-meta">'+p.id+' · Studio: '+(p.showOnPublic?'yes':'no')+' · Portfolio: '+(p.showOnPortfolio?'yes':'no')+'</div></div>'+
      '<div class="item-actions">'+
        '<button class="btn btn-sm" onclick="editItem(\'project\',\''+p.id+'\')">Edit</button>'+
        '<button class="btn btn-sm btn-danger" onclick="deleteItem(\'project\',\''+p.id+'\')">Delete</button>'+
      '</div></div>';
  }).join(''):'<p class="hint" style="padding:12px 0;">No projects yet.</p>';

  var bEl=document.getElementById('blog-list');
  bEl.innerHTML=state.blog.length?state.blog.map(function(b){
    return '<div class="item-row"><div><div class="item-title">'+b.title+
      '<span class="badge '+(b.draft?'badge-draft">Draft':'badge-live">Live')+'</span></div>'+
      '<div class="item-meta">'+b.id+' · '+b.date+'</div></div>'+
      '<div class="item-actions">'+
        '<button class="btn btn-sm" onclick="editItem(\'blog\',\''+b.id+'\')">Edit</button>'+
        '<button class="btn btn-sm btn-danger" onclick="deleteItem(\'blog\',\''+b.id+'\')">Delete</button>'+
      '</div></div>';
  }).join(''):'<p class="hint" style="padding:12px 0;">No posts yet.</p>';
}

async function deleteItem(type,id){
  if(!confirm('Delete this '+type+' permanently?'))return;
  showStatus('Deleting…');
  try{await callApi({action:'delete',type:type,id:id});await loadAll();}
  catch(e){showStatus('Delete failed: '+e.message,true);}
}

/* ── Toolbar helpers — cursor-preserving ── */
function wrapSel(id,before,after){
  var ta=document.getElementById(id);
  if(!ta)return;
  var s=ta.selectionStart,e=ta.selectionEnd,scroll=ta.scrollTop;
  var sel=ta.value.substring(s,e);
  ta.value=ta.value.substring(0,s)+before+sel+after+ta.value.substring(e);
  ta.scrollTop=scroll;
  ta.focus();
  ta.setSelectionRange(s+before.length,s+before.length+sel.length);
}
function prefixLine(id,prefix){
  var ta=document.getElementById(id);
  if(!ta)return;
  var s=ta.selectionStart,scroll=ta.scrollTop;
  var lineStart=ta.value.lastIndexOf('\n',s-1)+1;
  ta.value=ta.value.substring(0,lineStart)+prefix+ta.value.substring(lineStart);
  ta.scrollTop=scroll;
  ta.focus();
  ta.setSelectionRange(s+prefix.length,s+prefix.length);
}
function insertLink(id){
  var ta=document.getElementById(id);
  if(!ta)return;
  var s=ta.selectionStart,e=ta.selectionEnd,scroll=ta.scrollTop;
  var sel=ta.value.substring(s,e)||'link text';
  var url=prompt('Enter URL:','https://');
  if(!url)return;
  var md='['+sel+']('+url+')';
  ta.value=ta.value.substring(0,s)+md+ta.value.substring(e);
  ta.scrollTop=scroll;
  ta.focus();
  ta.setSelectionRange(s,s+md.length);
}
function toolbar(textareaId){
  return '<div class="toolbar">'+
    '<button type="button" title="Bold" onclick="wrapSel(\''+textareaId+'\',\'**\',\'**\')"><b>B</b></button>'+
    '<button type="button" title="Italic" onclick="wrapSel(\''+textareaId+'\',\'*\',\'*\')"><i>I</i></button>'+
    '<button type="button" title="H2 heading" onclick="prefixLine(\''+textareaId+'\',\'## \')">H2</button>'+
    '<button type="button" title="Bullet list" onclick="prefixLine(\''+textareaId+'\',\'- \')">• List</button>'+
    '<button type="button" title="Numbered list" onclick="prefixLine(\''+textareaId+'\',\'1. \')">1. List</button>'+
    '<button type="button" title="Insert link" onclick="insertLink(\''+textareaId+'\')">🔗 Link</button>'+
  '</div>';
}

/* ── Upload helpers ── */
window.__uploads={};
window.__downloads={};

function fileToBase64(file){
  return new Promise(function(res,rej){
    var r=new FileReader();
    r.onload=function(){res(r.result.split(',')[1]);};
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

function uploadWidget(fieldKey,existingPaths,multiple){
  window.__uploads[fieldKey]=(existingPaths||[]).slice();
  return '<div class="upload-list" id="upload-list-'+fieldKey+'">'+renderUploadItems(fieldKey)+'</div>'+
    '<input type="file" accept="image/*" '+(multiple?'multiple':'')+' onchange="handleImageUpload(\''+fieldKey+'\',this,'+(multiple?'true':'false')+')">';
}
function renderUploadItems(fieldKey){
  return (window.__uploads[fieldKey]||[]).map(function(path,i){
    return '<div class="upload-item"><img src="'+path+'" onerror="this.style.display=\'none\'">'+
      '<span class="path">'+path+'</span>'+
      '<button type="button" onclick="removeUpload(\''+fieldKey+'\','+i+')">&times;</button></div>';
  }).join('');
}
function removeUpload(fieldKey,i){
  window.__uploads[fieldKey].splice(i,1);
  document.getElementById('upload-list-'+fieldKey).innerHTML=renderUploadItems(fieldKey);
}
async function handleImageUpload(fieldKey,inputEl,multiple){
  var id=document.getElementById('f-id')?document.getElementById('f-id').value.trim():'site';
  var files=Array.from(inputEl.files);
  if(!multiple)files=files.slice(0,1);
  showStatus('Uploading '+files.length+' image(s)…');
  try{
    for(var i=0;i<files.length;i++){
      var file=files[i];
      var base64=await fileToBase64(file);
      var path='images/projects/'+id+'/'+Date.now()+'-'+file.name.replace(/[^a-zA-Z0-9.\-_]/g,'');
      var result=await callApi({action:'upload',path:path,contentBase64:base64});
      if(!multiple)window.__uploads[fieldKey]=[result.path];
      else window.__uploads[fieldKey].push(result.path);
    }
    document.getElementById('upload-list-'+fieldKey).innerHTML=renderUploadItems(fieldKey);
    hideStatus();
  }catch(e){showStatus('Upload failed: '+e.message,true);}
  inputEl.value='';
}

/* ── Download file widget (single files list, used inside downloadsSectionWidget and Creations) ──
   includeButtonText: whether to show a per-file "Button text" override.
   Projects/blog pass true (multiple files can each say something different).
   Creations passes false, since the single Download button's text is
   controlled at the section level (cr-downloadlabel-N) instead. */
function downloadWidget(fieldKey,existing,includeButtonText){
  if(includeButtonText===undefined)includeButtonText=true;
  window.__downloads[fieldKey]=JSON.parse(JSON.stringify(existing||[]));
  return '<div class="upload-list" id="download-list-'+fieldKey+'">'+renderDownloadItems(fieldKey)+'</div>'+
    '<div class="download-add-grid">'+
      '<div class="field"><label>Text beside button</label><input type="text" id="dl-label-'+fieldKey+'" placeholder="e.g. Project files (.zip)"></div>'+
      (includeButtonText?'<div class="field"><label>Button text <span style="text-transform:none;letter-spacing:0;font-weight:400;">(optional — defaults to "Download")</span></label><input type="text" id="dl-btntext-'+fieldKey+'" placeholder="Download"></div>':'')+
      '<div class="field"><label>Note <span style="text-transform:none;letter-spacing:0;font-weight:400;">(optional, e.g. file size)</span></label><input type="text" id="dl-meta-'+fieldKey+'" placeholder="e.g. 2.4 MB"></div>'+
      '<div class="field"><label>File</label><input type="file" id="dl-file-'+fieldKey+'"></div>'+
    '</div>'+
    '<button type="button" class="btn btn-sm btn-ghost" onclick="handleFileUpload(\''+fieldKey+'\')">Add file</button>';
}
function renderDownloadItems(fieldKey){
  return (window.__downloads[fieldKey]||[]).map(function(d,i){
    var bits=[esc(d.label||'(no label)')];
    if(d.buttonText)bits.push('button: "'+esc(d.buttonText)+'"');
    if(d.meta)bits.push(esc(d.meta));
    return '<div class="upload-item"><span class="path">'+bits.join(' · ')+' — '+d.file+'</span>'+
      '<button type="button" onclick="removeDownload(\''+fieldKey+'\','+i+')">&times;</button></div>';
  }).join('');
}
function removeDownload(fieldKey,i){
  window.__downloads[fieldKey].splice(i,1);
  document.getElementById('download-list-'+fieldKey).innerHTML=renderDownloadItems(fieldKey);
}
async function handleFileUpload(fieldKey){
  var id=document.getElementById('f-id')?document.getElementById('f-id').value.trim():'site';
  if(!id){alert('Set a URL slug first.');return;}
  var labelInput=document.getElementById('dl-label-'+fieldKey);
  var btnTextInput=document.getElementById('dl-btntext-'+fieldKey);
  var metaInput=document.getElementById('dl-meta-'+fieldKey);
  var fileInput=document.getElementById('dl-file-'+fieldKey);
  var label=labelInput.value.trim();
  var buttonText=btnTextInput?btnTextInput.value.trim():'';
  var meta=metaInput?metaInput.value.trim():'';
  var file=fileInput.files[0];
  if(!label||!file){alert('Add both text and a file.');return;}
  showStatus('Uploading file…');
  try{
    var base64=await fileToBase64(file);
    var path='files/'+id+'/'+Date.now()+'-'+file.name.replace(/[^a-zA-Z0-9.\-_]/g,'');
    var result=await callApi({action:'upload',path:path,contentBase64:base64});
    window.__downloads[fieldKey].push({label:label,file:result.path,meta:meta,buttonText:buttonText});
    document.getElementById('download-list-'+fieldKey).innerHTML=renderDownloadItems(fieldKey);
    labelInput.value='';
    if(btnTextInput)btnTextInput.value='';
    if(metaInput)metaInput.value='';
    fileInput.value='';
    hideStatus();
  }catch(e){showStatus('Upload failed: '+e.message,true);}
}

async function saveItem(asDraft){
  var type=state.editingType;
  var id=slugify(document.getElementById('f-id').value);
  if(!id){alert('Please set a URL slug.');return;}
  var item;
  if(type==='project'){
    var tags=document.getElementById('f-tags').value.split(',').map(function(t){return t.trim();}).filter(Boolean);
    item={
      id:id,draft:asDraft,
      appUrl:document.getElementById('f-app-url').value.trim(),
      appUrlPasswordProtected:document.getElementById('f-app-url-pw').checked,
      thumbnail:(window.__uploads['thumb']&&window.__uploads['thumb'][0])||'',
      showOnPublic:document.getElementById('f-public').checked,
      showOnPortfolio:document.getElementById('f-portfolio').checked,
      public:{
        title:document.getElementById('f-pub-title').value,summary:document.getElementById('f-pub-summary').value,tags:tags,description:document.getElementById('f-pub-desc').value,
        gallery:window.__uploads['pub-gallery']||[],

        downloadsShowHeading:document.getElementById('pub-dl-show-heading').checked,

        seo:{
          title:document.getElementById('f-pub-seo-title').value,
          metaDescription:document.getElementById('f-pub-meta-desc').value,
          keywords:document.getElementById('f-pub-keywords').value.split(',').map(function(k){return k.trim();}).filter(Boolean),
        },
      },
      portfolio:{
        title:document.getElementById('f-port-title').value,summary:document.getElementById('f-port-summary').value,tags:tags,description:document.getElementById('f-port-desc').value,
        gallery:window.__uploads['port-gallery']||[],
        downloads:window.__downloads['port-downloads']||[],
        downloadsEnabled:document.getElementById('port-dl-enabled').checked,
        downloadsShowHeading:document.getElementById('port-dl-show-heading').checked,
        downloadsHeading:document.getElementById('port-dl-heading').value,
        seo:{
          title:document.getElementById('f-port-seo-title').value,
          metaDescription:document.getElementById('f-port-meta-desc').value,
          keywords:document.getElementById('f-port-keywords').value.split(',').map(function(k){return k.trim();}).filter(Boolean),
        },
      },
    };
  }else{
    item={id:id,draft:asDraft,title:document.getElementById('f-title').value,date:document.getElementById('f-date').value,summary:document.getElementById('f-summary').value,thumbnail:(window.__uploads['thumb']&&window.__uploads['thumb'][0])||'',body:document.getElementById('f-body').value,
      appUrl:document.getElementById('f-blog-app-url').value.trim(),
      appUrlPasswordProtected:document.getElementById('f-blog-app-url-pw').checked,
      downloads:window.__downloads['blog-downloads']||[],
      downloadsEnabled:document.getElementById('blog-dl-enabled').checked,
      downloadsShowHeading:document.getElementById('blog-dl-show-heading').checked,
      downloadsHeading:document.getElementById('blog-dl-heading').value,
      seo:{
        title:document.getElementById('f-seo-title')?document.getElementById('f-seo-title').value:'',
        metaDescription:document.getElementById('f-meta-desc')?document.getElementById('f-meta-desc').value:'',
        keywords:document.getElementById('f-keywords')?document.getElementById('f-keywords').value.split(',').map(function(k){return k.trim();}).filter(Boolean):[],
      }};
  }
  showStatus(asDraft?'Saving draft…':'Publishing…');
  try{
    await callApi({action:'save',type:type,item:item});

      '</div>'+
    '</div>'+

    '<div class="card">'+
      '<div class="section-head" style="margin-bottom:14px;">'+
        '<h2 style="font-size:1.1rem;">Creations section</h2>'+
        '<button class="btn btn-sm btn-primary" onclick="addCreation()">+ Add creation</button>'+
      '</div>'+
      '<p class="hint" style="margin-bottom:14px;">Manage the items shown in the Creations row on the homepage.</p>'+
      '<div id="creations-builder">'+renderCreationsBuilder(creations)+'</div>'+
    '</div>'+

    '<div class="card">'+
      '<h2 style="font-size:1.1rem;margin-bottom:6px;">Google Analytics</h2>'+
      '<p class="hint" style="margin-bottom:12px;">Enter your GA4 Measurement ID (e.g. G-XXXXXXXXXX) after setting up Google Analytics. See the Analytics page for setup instructions.</p>'+
      '<div class="field"><label>GA4 Measurement ID</label><input type="text" id="s-ga4" value="'+esc((s.analytics&&s.analytics.ga4MeasurementId)||'')+'" placeholder="G-XXXXXXXXXX"></div>'+
    '</div>'+

    '<div class="card">'+
      '<h2 style="font-size:1.1rem;margin-bottom:6px;">Site identity</h2>'+
      '<div class="field"><label>Site name</label>'+
        '<input type="text" id="s-site-name" value="'+esc((s.site&&s.site.name)||'Gavin makes stuff')+'" placeholder="Gavin makes stuff"></div>'+
      '<div class="settings-grid">'+
        '<div class="field"><label>Footer — public pages</label><input type="text" id="s-footer-public" value="'+esc((s.site&&s.site.footerPublic)||'')+'" placeholder="&copy; 2026 Gavin makes stuff"></div>'+
        '<div class="field"><label>Footer — portfolio pages</label><input type="text" id="s-footer-portfolio" value="'+esc((s.site&&s.site.footerPortfolio)||'')+'" placeholder="&copy; 2026 Gavin Krohman"></div>'+
      '</div>'+
    '</div>'+

    '<div class="card">'+
      '<h2 style="font-size:1.1rem;margin-bottom:6px;">Page SEO</h2>'+
      '<p class="hint" style="margin-bottom:16px;">Meta titles and descriptions for each section. These appear in search results and browser tabs.</p>'+
      (function(){
        var pageDefs=[
          {key:'home',label:'Homepage'},
          {key:'studio',label:'The Studio homepage'},
          {key:'studioProjects',label:'Projects page'},
          {key:'studioBlog',label:'Blog page'},
          {key:'portfolio',label:'Portfolio homepage'},
          {key:'contact',label:'Contact page'},
        ];
        var pg=s.pages||{};
        return pageDefs.map(function(p,i){
          return '<div style="'+(i>0?'border-top:1px solid var(--border);padding-top:14px;margin-top:14px;':'')+'">'+
            '<p style="font-size:.82rem;font-weight:600;margin-bottom:10px;">'+p.label+'</p>'+
            '<div class="settings-grid">'+
              '<div class="field"><label>Meta title</label><input type="text" id="s-mt-'+p.key+'" value="'+(pg[p.key]&&pg[p.key].metaTitle||'')+'" placeholder="Page title — under 60 chars"></div>'+
              '<div class="field"><label>Meta description</label><input type="text" id="s-md-'+p.key+'" value="'+(pg[p.key]&&pg[p.key].metaDescription||'')+'" placeholder="Description — under 155 chars"></div>'+
            '</div>'+
          '</div>';
        }).join('');
      })()+
    '</div>'+

    '<div class="btn-row">'+
      '<button class="btn btn-primary" onclick="saveSettings()">Save all settings</button>'+
    '</div>';
}

function renderCreationsBuilder(creations){
  if(!creations||!creations.length)return '<p class="hint">No creations added yet.</p>';
  return creations.map(function(c,i){
    var envKey='TOOL_PASSWORD_'+(c.id||'id').toUpperCase().replace(/[^A-Z0-9]/g,'_');
    var downloadEnabled=c.downloadEnabled!==false;
    return '<div class="creation-item" id="creation-'+i+'">'+
      '<div class="creation-item-head">'+
        '<strong style="font-size:.9rem;">'+(c.name||'Unnamed')+'</strong>'+
        '<button class="btn btn-sm btn-danger" onclick="removeCreation('+i+')">Remove</button>'+
      '</div>'+
      '<div class="creation-row">'+
        '<div class="field"><label>Name</label><input type="text" id="cr-name-'+i+'" value="'+esc(c.name||'')+'"></div>'+
        '<div class="field"><label>URL</label><input type="url" id="cr-url-'+i+'" value="'+esc(c.url||'')+'"></div>'+
      '</div>'+
      '<div class="field"><label>Description</label><input type="text" id="cr-desc-'+i+'" value="'+esc(c.description||'')+'"></div>'+
      '<div class="creation-row">'+
        '<div class="field"><label>Status</label>'+
          '<select id="cr-status-'+i+'" onchange="toggleCreationCustom('+i+')">'+
            '<option value="open" '+(c.status==='open'?'selected':'')+'>Open to All</option>'+
            '<option value="private" '+(c.status==='private'?'selected':'')+'>Private — For Now</option>'+
            '<option value="wip" '+(c.status==='wip'?'selected':'')+'>Work In Progress</option>'+
            '<option value="custom" '+(c.status==='custom'?'selected':'')+'>Custom…</option>'+
          '</select></div>'+
        '<div class="field" id="cr-custom-'+i+'" style="'+(c.status==='custom'?'':'display:none;')+'">'+
          '<label>Custom label</label><input type="text" id="cr-label-'+i+'" value="'+esc(c.statusLabel||'')+'"></div>'+
      '</div>'+
      '<div class="creation-row">'+
        '<div class="field"><label>Thumbnail (optional)</label>'+uploadWidget('cr-thumb-'+i,c.thumbnail?[c.thumbnail]:[],false)+'</div>'+
        '<div class="field" style="display:flex;align-items:center;gap:8px;padding-top:22px;">'+
          '<label class="check-label"><input type="checkbox" id="cr-show-'+i+'" '+(c.showOnHome?'checked':'')+'>Show on homepage</label>'+
        '</div>'+
      '</div>'+

      '<div class="creation-section-label">Use It button</div>'+
      '<div class="creation-row" style="margin-bottom:14px;">'+
        '<div class="field" style="margin-bottom:0;"><label>Button text</label><input type="text" id="cr-uselabel-'+i+'" value="'+esc(c.useLabel||'Use It')+'"></div>'+
        '<div class="field" style="display:flex;align-items:center;gap:8px;padding-top:22px;margin-bottom:0;">'+
          '<label class="check-label"><input type="checkbox" id="cr-pw-'+i+'" onchange="toggleCreationPwHint('+i+')" '+(c.passwordProtected?'checked':'')+'>Password protected</label>'+
        '</div>'+
      '</div>'+
      '<div class="creation-pw-hint" id="cr-pw-hint-'+i+'" style="'+(c.passwordProtected?'':'display:none;')+'">'+
        'Set the real password in Vercel → Environment Variables as <code>'+envKey+'</code>. It never lives in this JSON file, since visitors can fetch it directly.'+
      '</div>'+

      '<div class="creation-section-label">Download button</div>'+
      '<div class="downloads-section-box">'+
        '<div class="checkbox-row" style="margin-bottom:'+(downloadEnabled?'14px':'0')+';">'+
          '<label class="check-label"><input type="checkbox" id="cr-download-enabled-'+i+'" '+(downloadEnabled?'checked':'')+' onchange="toggleCreationDownload('+i+')">Show Download button</label>'+
        '</div>'+
        '<div id="cr-download-inner-'+i+'" style="'+(downloadEnabled?'':'display:none;')+'">'+
          '<div class="field"><label>Button text</label><input type="text" id="cr-downloadlabel-'+i+'" value="'+esc(c.downloadLabel||'Download')+'"></div>'+
          downloadWidget('cr-download-'+i,c.downloadFile?[c.downloadFile]:[],false)+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

function toggleCreationCustom(i){
  var val=document.getElementById('cr-status-'+i).value;
  document.getElementById('cr-custom-'+i).style.display=val==='custom'?'block':'none';
}
function toggleCreationPwHint(i){
  var checked=document.getElementById('cr-pw-'+i).checked;
  document.getElementById('cr-pw-hint-'+i).style.display=checked?'block':'none';
}
function toggleCreationDownload(i){
  var checked=document.getElementById('cr-download-enabled-'+i).checked;
  document.getElementById('cr-download-inner-'+i).style.display=checked?'block':'none';
}

function addCreation(){
  state.settings.creations=state.settings.creations||[];
  state.settings.creations.push({id:'new-creation-'+Date.now(),name:'New creation',description:'',url:'/',status:'private',statusLabel:'',thumbnail:'',showOnHome:true,useLabel:'Use It',passwordProtected:false,downloadEnabled:true,downloadLabel:'Download',downloadFile:null});
  renderSettingsForm();
}
function removeCreation(i){
  if(!confirm('Remove this creation?'))return;
  state.settings.creations.splice(i,1);
  renderSettingsForm();
}

async function handleFaviconUpload(inputEl){
  var file=inputEl.files[0];
  if(!file)return;
  showStatus('Uploading favicon…');
  try{
    var base64=await fileToBase64(file);
    var ext=file.name.split('.').pop();
    var path='images/site/favicon.'+ext;
    var result=await callApi({action:'upload',path:path,contentBase64:base64});
    state.settings.favicon=result.path;
    document.getElementById('favicon-preview-img').src=result.path+'?t='+Date.now();
    hideStatus();
    showStatus('✓ Favicon uploaded. Save settings to apply.',false,true);
  }catch(e){showStatus('Upload failed: '+e.message,true);}
  inputEl.value='';
}

async function saveSettings(){
  var creations=state.settings.creations||[];
  var savedCreations=creations.map(function(c,i){
    return{
      id:c.id||slugify(document.getElementById('cr-name-'+i)?.value||'creation'),
      name:document.getElementById('cr-name-'+i)?.value||'',
      description:document.getElementById('cr-desc-'+i)?.value||'',
      url:document.getElementById('cr-url-'+i)?.value||'/',
      status:document.getElementById('cr-status-'+i)?.value||'private',
      statusLabel:document.getElementById('cr-label-'+i)?.value||'',
      thumbnail:(window.__uploads['cr-thumb-'+i]&&window.__uploads['cr-thumb-'+i][0])||c.thumbnail||'',
      showOnHome:document.getElementById('cr-show-'+i)?document.getElementById('cr-show-'+i).checked:true,
      useLabel:document.getElementById('cr-uselabel-'+i)?.value||'Use It',
      passwordProtected:document.getElementById('cr-pw-'+i)?document.getElementById('cr-pw-'+i).checked:false,
      downloadEnabled:document.getElementById('cr-download-enabled-'+i)?document.getElementById('cr-download-enabled-'+i).checked:true,
      downloadLabel:document.getElementById('cr-downloadlabel-'+i)?.value||'Download',
      downloadFile:(window.__downloads['cr-download-'+i]&&window.__downloads['cr-download-'+i][0])||c.downloadFile||null,
    };
  });

  var pageKeys=['home','studio','studioProjects','studioBlog','portfolio','contact'];
  var pages={};
  pageKeys.forEach(function(k){
    var mt=document.getElementById('s-mt-'+k);
    var md=document.getElementById('s-md-'+k);
    pages[k]={metaTitle:mt?mt.value:'',metaDescription:md?md.value:''};
  });
  var siteNameEl=document.getElementById('s-site-name');
  var footerPubEl=document.getElementById('s-footer-public');
  var footerPortEl=document.getElementById('s-footer-portfolio');
  var studioBioEl=document.getElementById('s-studio-bio');
  var newSettings={
    site:{
      name:siteNameEl?siteNameEl.value:'Gavin makes stuff',
      footerPublic:footerPubEl?footerPubEl.value:'© 2026 Gavin makes stuff',
      footerPortfolio:footerPortEl?footerPortEl.value:'© 2026 Gavin Krohman',
    },
    home:{eyebrow:document.getElementById('s-eyebrow').value,tagline:document.getElementById('s-tagline').value,description:document.getElementById('s-desc').value,location:document.getElementById('s-home-location').value},
    bio:{headshot:(window.__uploads['headshot']&&window.__uploads['headshot'][0])||state.settings.bio?.headshot||'',name:document.getElementById('s-name').value,location:document.getElementById('s-location').value,portfolioSummary:document.getElementById('s-port-bio').value,studioSummary:studioBioEl?studioBioEl.value:''},
    contact:{email:document.getElementById('s-email').value,linkedin:document.getElementById('s-linkedin').value,dribbble:document.getElementById('s-dribbble').value},
    favicon:state.settings.favicon||(document.getElementById('s-favicon-path')?.value||''),
    analytics:{ga4MeasurementId:document.getElementById('s-ga4').value},
    pages:pages,
    creations:savedCreations,
  };

  showStatus('Saving settings…');
  try{
    await callApi({action:'save-settings',settings:newSettings});
    state.settings=newSettings;
    hideStatus();
    showStatus('✓ Settings saved! Site updates in ~30s.',false,true);
  }catch(e){showStatus('Save failed: '+e.message,true);}
}
</script>
</body>
</html>
